# =============================================================================
#  Omnia — Docker Compose for self-hosted Dokploy deployment
#
#  Services
#  --------
#    spacetimedb : long-running SpacetimeDB server (persistent data)
#    publisher   : one-shot container that publishes the module on each deploy
#    frontend    : nginx serving the Vite-built SPA
#
#  All three services run on the shared `dokploy-network` so Dokploy's
#  Traefik instance can route public traffic to `frontend` and `spacetimedb`.
#  A second internal network (`omnia-internal`) keeps the publisher's traffic
#  private and isolates internal DB traffic.
#
#  Required environment variables (set in the Dokploy UI → Environment tab):
#    DOMAIN                    e.g. omnia.example.com
#    DB_DOMAIN                 e.g. db.omnia.example.com
#    VITE_SPACETIMEDB_HOST     e.g. wss://db.omnia.example.com
#    VITE_SPACETIMEDB_DB_NAME  e.g. omnia
#
#  Dokploy gotcha: bind mounts relative to the repo are wiped on every
#  `git clone`. We use named Docker volumes only — this also enables
#  Dokploy's Volume Backups (S3-compatible) for the SpacetimeDB data.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # SpacetimeDB server — the runtime that hosts the chat module
  # ---------------------------------------------------------------------------
  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: ["start"]
    restart: unless-stopped
    volumes:
      # Named volume → survives redeploys and is eligible for Volume Backups.
      - stdb-data:/stdb
    healthcheck:
      # The spacetime image ships wget via busybox; use it to probe /health.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
      - omnia-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    labels:
      # --- Public WebSocket endpoint: wss://${DB_DOMAIN} -------------------
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.omnia-db.rule=Host(`${DB_DOMAIN}`)"
      - "traefik.http.routers.omnia-db.entrypoints=websecure"
      - "traefik.http.routers.omnia-db.tls=true"
      - "traefik.http.routers.omnia-db.tls.certresolver=letsencrypt"
      - "traefik.http.services.omnia-db.loadbalancer.server.port=3000"
      # Traefik handles WebSocket upgrades automatically, but we set a long
      # read timeout for persistent subscriptions.
      - "traefik.http.middlewares.omnia-db-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.omnia-db.middlewares=omnia-db-headers"

  # ---------------------------------------------------------------------------
  # Module publisher — one-shot: waits for spacetimedb, then publishes module
  # ---------------------------------------------------------------------------
  publisher:
    build:
      context: .
      dockerfile: Dockerfile
      target: publisher
    depends_on:
      spacetimedb:
        condition: service_healthy
    environment:
      SPACETIMEDB_DB_NAME: ${VITE_SPACETIMEDB_DB_NAME}
    restart: "no"
    networks:
      - omnia-internal

  # ---------------------------------------------------------------------------
  # Frontend — nginx serving the Vite SPA
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        # Vite bakes these into the bundle at build time — must be passed
        # as build args, not runtime environment.
        VITE_SPACETIMEDB_HOST: ${VITE_SPACETIMEDB_HOST}
        VITE_SPACETIMEDB_DB_NAME: ${VITE_SPACETIMEDB_DB_NAME}
    restart: unless-stopped
    depends_on:
      spacetimedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    labels:
      # --- Public HTTPS endpoint: https://${DOMAIN} ------------------------
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.omnia-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.omnia-web.entrypoints=websecure"
      - "traefik.http.routers.omnia-web.tls=true"
      - "traefik.http.routers.omnia-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.omnia-web.loadbalancer.server.port=80"
      # Redirect any plain HTTP hit to HTTPS
      - "traefik.http.routers.omnia-web-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.omnia-web-http.entrypoints=web"
      - "traefik.http.routers.omnia-web-http.middlewares=omnia-web-https-redirect"
      - "traefik.http.middlewares.omnia-web-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.omnia-web-https-redirect.redirectscheme.permanent=true"

networks:
  # Traefik's shared network, managed by Dokploy — must exist before deploy.
  dokploy-network:
    external: true
  # Private network for internal DB/publisher traffic
  omnia-internal:
    driver: bridge

volumes:
  # SpacetimeDB persistent state. Named (not bind-mounted) so it survives
  # Dokploy's per-deploy `git clone` wipe and can be S3-backed up.
  stdb-data:
